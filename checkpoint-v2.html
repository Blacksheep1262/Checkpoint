function dayColor(entries){if(!entries.length)return"var(--text-mut)";let w=0;entries.forEach(e=>{let s=0;if(e.module==="gut"){s=e.noMovement?3:Math.max(e.pain||0,e.bloating||0);if(e.blood)s=Math.max(s,8)}else if(e.module==="head"){s=e.severity||0;if(e.prostrating)s=Math.max(s,9)}else if(e.module==="pain"){s=e.severity||0;if(e.limitedFunction)s=Math.max(s,9)}else if(e.module==="sleep"){const q=e.quality||3;s=q<=1?8:q<=2?6:q<=3?3:0}else if(e.module==="mood"){s=Math.max(10-(e.energy||5),e.stressLevel||5);if(e.moods&&(e.moods.includes("Hopeless")||e.moods.includes("Overwhelmed")))s=Math.max(s,7)}else if(e.module==="hydration"){const p=e.peeColor||3;s=p>=7?8:p>=5?5:p>=4?3:0}else if(e.module==="checkin"){const o=e.overall||3;s=o<=1?8:o<=2?5:o<=3?3:0}else if(e.module==="sexual"){const f=e.firmness||4;s=f<=1?7:f<=2?5:f<=3?3:0}else if(e.module==="vitals"){if(e.bloodSugar){const bs=parseFloat(e.bloodSugar);if(bs>200||bs<60)s=Math.max(s,8);else if(bs>140||bs<70)s=Math.max(s,5)}if(e.systolic){const sys=parseFloat(e.systolic);if(sys>160||sys<90)s=Math.max(s,7);else if(sys>140||sys<100)s=Math.max(s,4)}}w=Math.max(w,s)});if(w<=2)return"#22c55e";if(w<=4)return"#eab308";if(w<=6)return"#f97316";return"#ef4444"}

else if(e.module==="vitals"){inner+='<div class="tgr">';if(e.bloodSugar)inner+=tag("Sugar: "+e.bloodSugar+" mg/dL","#10b981");if(e.systolic&&e.diastolic)inner+=tag("BP: "+e.systolic+"/"+e.diastolic,"#10b981");if(e.heartRate)inner+=tag("HR: "+e.heartRate+" BPM","#10b981");if(e.weight)inner+=tag("Wt: "+e.weight+" lbs","#10b981");inner+="</div>"}

else if(e.module==="hydration"){const p=e.peeColor?PEE.find(x=>x.id===e.peeColor):null;inner+='<div class="em">';if(p)inner+='<div style="width:20px;height:20px;border-radius:50%;background:'+p.color+';border:1px solid rgba(255,255,255,0.1)"></div><span style="font-size:14px;font-weight:600">'+p.hyd+"</span>";inner+='</div><div class="tgr">';if(e.waterOz)inner+=tag(e.waterOz+"oz water","#06b6d4");if(e.nightWakes&&e.nightWakes!=="0")inner+=tag("Night wakes: "+e.nightWakes,"#06b6d4");(e.symptoms||[]).forEach(s=>{inner+=tag(s,"#22d3ee")});inner+="</div>"}
else if(e.module==="meds"){inner+='<div class="tgr">';(e.meds||[]).forEach(m=>{inner+=tag(m,"#ec4899")});(e.customMeds||[]).forEach(m=>{inner+=tag(m,"#f472b6")});if(e.medTime)inner+=tag(e.medTime,"#a855f7");inner+="</div>"}
if(e.notes)inner+='<div class="en">'+esc(e.notes)+"</div>";
return'<div class="ec" style="border-left-color:'+bc+'"><div class="ea"><button class="ebt" onclick="editEntry(\''+e.id+'\')" title="Edit">\u270E</button><button class="ebt dl" onclick="confirmDelete(\''+e.id+'\')" title="Delete">\u2715</button></div><div class="et">'+fT(e.timestamp)+"</div>"+inner+"</div>"}

function renderHistory(){const me=S.entries.filter(e=>e.module===S.mod);if(!me.length)return'<div class="es"><div class="esi">'+(MODULES.find(m=>m.id===S.mod)||{}).icon+'</div><div class="est">No entries yet</div><div class="ess">Tap + Log to start tracking</div></div>';const g={};me.forEach(e=>{const dk=dateKey(e.timestamp);if(!g[dk])g[dk]=[];g[dk].push(e)});let h="";const ks=Object.keys(g);ks.forEach((dk,gi)=>{const ents=g[dk];const isFirst=gi===0;const isOpen=S.collapsed[dk]===undefined?isFirst:!S.collapsed[dk];const color=dayColor(ents);h+='<div class="dgr"><div class="dh" onclick="toggleDate(\''+esc(dk)+'\')"><div style="display:flex;align-items:center;gap:8px"><div class="ddt" style="background:'+color+'"></div><span class="dlb">'+dk+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="dct">'+ents.length+" entr"+(ents.length===1?"y":"ies")+'</span><span class="dcv'+(isOpen?" o":"")+'">&#9660;</span></div></div>';if(isOpen){h+="<div>";ents.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).forEach(e=>{h+=renderEntry(e)});h+="</div>"}h+="</div>"});return h}

function doExportPDF(){const MN={checkin:"Daily Check-in",gut:"Bowel / GI",head:"Headaches",sexual:"Sexual Health",pain:"Pain",sleep:"Sleep",vitals:"Vitals",mood:"Mood / Mental Health",hydration:"Hydration / Urinary",meds:"Medications"};const groups={};S.entries.forEach(e=>{if(!groups[e.module])groups[e.module]=[];groups[e.module].push(e)});let html="<!DOCTYPE html><html><head><style>@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Barlow',sans-serif;color:#1a1a1a;padding:32px;max-width:800px;margin:0 auto;font-size:11px;line-height:1.5}.ph{border-bottom:3px solid #c8a84e;padding-bottom:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end}.pl{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.12em;color:#c8a84e}.ps{font-size:10px;color:#666;letter-spacing:0.06em}.pd{font-size:10px;color:#666;text-align:right}.psum{background:#f9f9f9;border:1px solid #eee;border-radius:6px;padding:12px;margin-bottom:18px}.pst{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}.psr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}.psl{color:#666}.psv{font-weight:600}.psec{margin-bottom:18px;page-break-inside:avoid}.psect{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1.5px solid #ddd;padding-bottom:4px;margin-bottom:8px}.pe{padding:6px 0;border-bottom:1px solid #eee}.pet{font-size:10px;color:#888;font-weight:600}.ped{margin-top:2px}.ptg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;margin:1px 2px;background:#f0f0f0;color:#444}.psv2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px}.pfl{color:#dc2626;font-weight:700;font-size:10px}.pn{font-style:italic;font-size:10px;color:#666;margin-top:2px}.pf{margin-top:24px;padding-top:12px;border-top:1.5px solid #ddd;font-size:9px;color:#888;text-align:center}@media print{body{padding:16px}@page{margin:0.5in}}</style></head><body>";
html+='<div class="ph"><div><div class="pl">CHECKPOINT</div><div class="ps">Men\'s Health Tracker \u2014 Medical Symptom Record</div></div><div class="pd">Generated: '+new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+"<br>Total Entries: "+S.entries.length+"</div></div>";
const earliest=S.entries.length?new Date(Math.min(...S.entries.map(e=>new Date(e.timestamp)))):null;const latest=S.entries.length?new Date(Math.max(...S.entries.map(e=>new Date(e.timestamp)))):null;
html+='<div class="psum"><div class="pst">Report Summary</div>';if(earliest&&latest)html+='<div class="psr"><span class="psl">Date Range</span><span class="psv">'+fD(earliest.toISOString())+" \u2014 "+fD(latest.toISOString())+"</span></div>";MODULES.forEach(m=>{const c=(groups[m.id]||[]).length;if(c)html+='<div class="psr"><span class="psl">'+MN[m.id]+'</span><span class="psv">'+c+" entries</span></div>"});html+="</div>";
Object.entries(groups).forEach(([mod,items])=>{html+='<div class="psec"><div class="psect">'+(MN[mod]||mod)+"</div>";items.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).forEach(e=>{html+='<div class="pe"><div class="pet">'+fDT(e.timestamp)+'</div><div class="ped">';
if(mod==="checkin"){const o=CK_OVERALL.find(x=>x.val===e.overall);if(o)html+='<span class="psv2">'+o.label+"</span> ";if(e.energy!=null)html+='<span class="ptg">Energy: '+e.energy+"/10</span>"}
else if(mod==="gut"){if(e.noMovement)html+='<span class="pfl">NO BOWEL MOVEMENT</span>';else{if(e.bristol){const b=BRISTOL.find(x=>x.type===e.bristol);if(b)html+='<span class="psv2">Type '+b.type+'</span> <span class="ptg">'+b.desc+"</span> "}html+='<span class="ptg">Pain: '+(e.pain||0)+'/10</span><span class="ptg">Bloating: '+(e.bloating||0)+"/10</span>";if(e.strain)html+='<span class="ptg">Straining</span>';if(e.blood)html+='<span class="pfl"> BLOOD</span>'}}
else if(mod==="head"){html+='<span class="psv2">'+e.severity+"/10</span> ";if(e.prostrating)html+='<span class="pfl">PROSTRATING</span> ';if(e.duration)html+='<span class="ptg">'+e.duration+"</span>";(e.locations||[]).forEach(l=>{html+='<span class="ptg">'+l+"</span>"});(e.triggers||[]).forEach(t=>{html+='<span class="ptg">'+t+"</span>"});(e.symptoms||[]).forEach(s=>{html+='<span class="ptg">'+s+"</span>"})}
else if(mod==="sexual"){const f=e.firmness?ED_F.find(x=>x.val===e.firmness):null;if(f)html+='<span class="psv2">'+f.val+'/4</span> <span class="ptg">'+f.label+" \u2014 "+f.desc+"</span> ";if(e.morningErection)html+='<span class="ptg">AM: '+e.morningErection+"</span>";if(e.libido)html+='<span class="ptg">Libido: '+e.libido+"/10</span>";(e.factors||[]).forEach(f2=>{html+='<span class="ptg">'+f2+"</span>"})}
else if(mod==="pain"){html+='<span class="psv2">'+e.severity+"/10</span> ";if(e.limitedFunction)html+='<span class="pfl">LIMITED FUNCTION</span> ';(e.locations||[]).forEach(l=>{html+='<span class="ptg">'+l+"</span>"});(e.types||[]).forEach(t=>{html+='<span class="ptg">'+t+"</span>"})}
else if(mod==="sleep"){const q=e.quality?SL_Q.find(x=>x.val===e.quality):null;if(q)html+='<span class="psv2">'+q.label+"</span> ";if(e.hours)html+='<span class="ptg">'+e.hours+" hrs</span>";(e.issues||[]).forEach(i=>{html+='<span class="ptg">'+i+"</span>"})}
else if(mod==="vitals"){if(e.bloodSugar)html+='<span class="ptg">Sugar: '+e.bloodSugar+" mg/dL</span>";if(e.systolic&&e.diastolic)html+='<span class="ptg">BP: '+e.systolic+"/"+e.diastolic+"</span>";if(e.heartRate)html+='<span class="ptg">HR: '+e.heartRate+" BPM</span>";if(e.weight)html+='<span class="ptg">Wt: '+e.weight+" lbs</span>"}
else if(mod==="mood"){(e.moods||[]).forEach(mo=>{html+='<span class="ptg">'+mo+"</span>"});if(e.energy!=null)html+='<span class="ptg">Energy: '+e.energy+"/10</span>";if(e.stressLevel!=null)html+='<span class="ptg">Stress: '+e.stressLevel+"/10</span>"}
else if(mod==="hydration"){const p=e.peeColor?PEE.find(x=>x.id===e.peeColor):null;if(p)html+='<span class="ptg">'+p.label+" \u2014 "+p.hyd+"</span>";if(e.waterOz)html+='<span class="ptg">'+e.waterOz+"oz water</span>";if(e.nightWakes&&e.nightWakes!=="0")html+='<span class="ptg">Night wakes: '+e.nightWakes+"</span>";(e.symptoms||[]).forEach(s=>{html+='<span class="ptg">'+s+"</span>"})}
else if(mod==="meds"){(e.meds||[]).forEach(m=>{html+='<span class="ptg">'+m+"</span>"});(e.customMeds||[]).forEach(m=>{html+='<span class="ptg">'+m+"</span>"});if(e.medTime)html+='<span class="ptg">'+e.medTime+"</span>"}
if(e.notes)html+='<div class="pn">'+esc(e.notes)+"</div>";html+="</div></div>"});html+="</div>"});
html+='<div class="pf">Generated by CHECKPOINT \u2014 Men\'s Health Tracker<br>All entries logged at time of occurrence. This is a patient-generated report.</div></body></html>';const w=window.open("","_blank","width=800,height=600");if(w){w.document.write(html);w.document.close();setTimeout(()=>{w.print()},500)}}

function emailDoctor(){if(!S.doctorEmail){S.showSettings=true;render();return}const subj=encodeURIComponent("CHECKPOINT Health Report \u2014 "+new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}));const body=encodeURIComponent("Doctor,\n\nPlease find my CHECKPOINT health tracker report attached.\n\nTotal entries: "+S.entries.length+"\nDate range: "+(S.entries.length?fD(new Date(Math.min(...S.entries.map(e=>new Date(e.timestamp)))).toISOString())+" \u2014 "+fD(new Date(Math.max(...S.entries.map(e=>new Date(e.timestamp)))).toISOString()):"N/A")+"\n\nPlease use the PDF Export in CHECKPOINT and attach it to this email for the full detailed report.\n\n\u2014 Sent via CHECKPOINT Men's Health Tracker");window.location.href="mailto:"+S.doctorEmail+"?subject="+subj+"&body="+body}

function renderSettings(){let h='<div class="sp"><div class="st">Settings</div><div class="sf"><label>Doctor\'s Email</label><input type="email" class="ti2" placeholder="doctor@example.com" value="'+esc(S.doctorEmail)+'" oninput="S.doctorEmail=this.value;save()"></div><div style="font-size:12px;color:var(--text-sec);margin-bottom:16px;line-height:1.5">Set your doctor\'s email. The \uD83D\uDCE7 button opens your email app with a pre-filled message. Export PDF first and attach it.</div><button class="bp" onclick="S.showSettings=false;render()">DONE</button><div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)"><button class="bs dg" onclick="S.showConfirm=\'reset\';render()">RESET ALL DATA</button></div><div style="margin-top:12px"><button class="bs" onclick="doExportText()">EXPORT AS TEXT</button></div></div>';return h}

function doExportText(){const MN={checkin:"DAILY CHECK-IN",gut:"BOWEL / GI",head:"HEADACHES",sexual:"SEXUAL HEALTH",pain:"PAIN",sleep:"SLEEP",vitals:"VITALS",mood:"MOOD / MENTAL HEALTH",hydration:"HYDRATION / URINARY",meds:"MEDICATIONS"};let t="CHECKPOINT \u2014 MEN'S HEALTH TRACKER\nMedical Symptom Record\nGenerated: "+new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+"\n"+"\u2550".repeat(60)+"\n\n";const groups={};S.entries.forEach(e=>{if(!groups[e.module])groups[e.module]=[];groups[e.module].push(e)});Object.entries(groups).forEach(([mod,items])=>{t+=MN[mod]||mod.toUpperCase();t+="\n"+"\u2500".repeat(40)+"\nTotal entries: "+items.length+"\n\n";items.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).forEach((e,i)=>{t+="["+(i+1)+"] "+fDT(e.timestamp)+"\n";if(mod==="checkin"){const o=CK_OVERALL.find(x=>x.val===e.overall);if(o)t+="    Overall: "+o.label+"\n";if(e.energy!=null)t+="    Energy: "+e.energy+"/10\n"}else if(mod==="gut"){if(e.noMovement)t+="    Status: NO BOWEL MOVEMENT\n";else{if(e.bristol){const b=BRISTOL.find(x=>x.type===e.bristol);if(b)t+="    Bristol Type: "+b.type+" ("+b.desc+")\n"}t+="    Pain: "+(e.pain||0)+"/10 | Bloating: "+(e.bloating||0)+"/10\n";if(e.strain)t+="    Straining: Yes\n";if(e.blood)t+="    Blood: Yes\n"}}else if(mod==="head"){t+="    Severity: "+e.severity+"/10\n";if(e.prostrating)t+="    *** PROSTRATING ***\n";if(e.duration)t+="    Duration: "+e.duration+"\n";if(e.locations&&e.locations.length)t+="    Location: "+e.locations.join(", ")+"\n";if(e.triggers&&e.triggers.length)t+="    Triggers: "+e.triggers.join(", ")+"\n";if(e.symptoms&&e.symptoms.length)t+="    Symptoms: "+e.symptoms.join(", ")+"\n"}else if(mod==="sexual"){const f=e.firmness?ED_F.find(x=>x.val===e.firmness):null;if(f)t+="    Firmness: "+f.val+"/4 ("+f.label+")\n";if(e.morningErection)t+="    Morning: "+e.morningErection+"\n";if(e.libido)t+="    Libido: "+e.libido+"/10\n";if(e.factors&&e.factors.length)t+="    Factors: "+e.factors.join(", ")+"\n"}else if(mod==="pain"){t+="    Severity: "+e.severity+"/10\n";if(e.limitedFunction)t+="    *** LIMITED FUNCTION ***\n";if(e.locations&&e.locations.length)t+="    Locations: "+e.locations.join(", ")+"\n";if(e.types&&e.types.length)t+="    Type: "+e.types.join(", ")+"\n"}else if(mod==="sleep"){const q=e.quality?SL_Q.find(x=>x.val===e.quality):null;if(q)t+="    Quality: "+q.label+"\n";if(e.hours)t+="    Hours: "+e.hours+"\n";if(e.issues&&e.issues.length)t+="    Issues: "+e.issues.join(", ")+"\n"}else if(mod==="vitals"){if(e.bloodSugar)t+="    Sugar: "+e.bloodSugar+" mg/dL\n";if(e.systolic&&e.diastolic)t+="    BP: "+e.systolic+"/"+e.diastolic+"\n";if(e.heartRate)t+="    HR: "+e.heartRate+" BPM\n";if(e.weight)t+="    Weight: "+e.weight+" lbs\n"}else if(mod==="mood"){if(e.moods&&e.moods.length)t+="    Mood: "+e.moods.join(", ")+"\n";if(e.energy!=null)t+="    Energy: "+e.energy+"/10\n";if(e.stressLevel!=null)t+="    Stress: "+e.stressLevel+"/10\n"}else if(mod==="hydration"){const p=e.peeColor?PEE.find(x=>x.id===e.peeColor):null;if(p)t+="    Urine: "+p.label+" ("+p.hyd+")\n";if(e.waterOz)t+="    Water: "+e.waterOz+" oz\n";if(e.nightWakes)t+="    Night Wakes: "+e.nightWakes+"\n";if(e.symptoms&&e.symptoms.length)t+="    Symptoms: "+e.symptoms.join(", ")+"\n"}else if(mod==="meds"){if(e.meds&&e.meds.length)t+="    Meds: "+e.meds.join(", ")+"\n";if(e.customMeds&&e.customMeds.length)t+="    Custom: "+e.customMeds.join(", ")+"\n";if(e.medTime)t+="    Time: "+e.medTime+"\n"}if(e.notes)t+="    Notes: "+e.notes+"\n";t+="\n"})});t+="\u2550".repeat(60)+"\nGenerated by CHECKPOINT\n";const blob=new Blob([t],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="checkpoint-"+new Date().toISOString().slice(0,10)+".txt";a.click();URL.revokeObjectURL(url)}

function render(){const app=document.getElementById("app");const mod=MODULES.find(m=>m.id===S.mod);let h="";
h+='<div class="hdr"><div><div class="logo">CHECKPOINT</div><div class="tagline">Your body. Your data. Your call.</div></div><div class="hdr-a"><button class="btn-h" onclick="doExportPDF()">PDF</button><button class="btn-h" onclick="emailDoctor()">\uD83D\uDCE7</button><button class="btn-h" onclick="S.showSettings=!S.showSettings;S.showForm=false;render()">\u2699</button></div></div>';
if(S.showSettings){h+=renderSettings()}else{h+='<div class="cw">';if(S.showForm){h+=renderForm()}else{h+='<div style="padding-top:12px"><button class="bp" onclick="S.showForm=true;S.form={};S.editId=null;render()">+ LOG '+(mod?mod.label:"").toUpperCase()+"</button></div>";h+='<div style="margin-top:16px">'+renderHistory()+"</div>"}h+="</div>"}
if(S.showConfirm){h+='<div class="mo" onclick="S.showConfirm=null;render()"><div class="mb" onclick="event.stopPropagation()">';if(S.showConfirm==="reset"){h+='<div class="mt">Reset All Data?</div><div class="mm">This will permanently delete all entries. Cannot be undone.</div><div class="ma"><button class="mbt mc" onclick="S.showConfirm=null;render()">Cancel</button><button class="mbt md" onclick="S.entries=[];save();S.showConfirm=null;S.collapsed={};render()">Reset</button></div>'}else if(S.showConfirm.startsWith("delete:")){const did=S.showConfirm.split(":")[1];h+='<div class="mt">Delete Entry?</div><div class="mm">This entry will be permanently removed.</div><div class="ma"><button class="mbt mc" onclick="S.showConfirm=null;render()">Cancel</button><button class="mbt md" onclick="doDelete(\''+did+'\')">Delete</button></div>'}h+="</div></div>"}
const pp=5;const tp=Math.ceil(MODULES.length/pp);const vm=MODULES.slice(S.navPage*pp,(S.navPage+1)*pp);
h+='<div class="bnav">';if(tp>1){h+='<div class="ndots">';for(let i=0;i<tp;i++){h+='<button class="ndot'+(S.navPage===i?" a":"")+'" onclick="S.navPage='+i+';render()"></button>'}h+="</div>"}h+='<div class="ntabs">';vm.forEach(m=>{const a=S.mod===m.id;const c=S.entries.filter(e=>e.module===m.id).length;h+='<button class="tb'+(a?" a":"")+'" style="--ac:'+m.color+'" onclick="S.mod=\''+m.id+"';S.showForm=false;S.showSettings=false;render()\"><div class=\"tind\"></div><span class=\"ti\">"+m.icon+"</span><span class=\"tl\">"+m.label+"</span>"+(c?'<span class="tbdg">'+c+"</span>":"")+"</button>"});h+="</div></div>";
app.innerHTML=h;app.querySelectorAll("button").forEach(b=>{b.addEventListener("mousedown",e=>{e.preventDefault()})})}

setTimeout(()=>{document.getElementById("loader").classList.add("h");render()},600);
</script>
