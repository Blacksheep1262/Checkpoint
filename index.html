<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checkpoint">
<meta name="theme-color" content="#08080a">
<title>CHECKPOINT — Men's Health Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--sf:#111114;--cd:#161619;--inp:#0d0d10;--bd:#1f1f24;--tx:#e4e4e8;--ts:#8a8a94;--tm:#45454d;--ac:#c8a84e;--ad:rgba(200,168,78,0.15);--fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100dvh;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow:hidden}
.grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px;pointer-events:none;z-index:1;opacity:.6}
.carbon{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);pointer-events:none;z-index:1}
@keyframes fs{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.sec{margin-bottom:22px}.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ts);font-family:var(--fh);display:block;margin-bottom:10px}
.sr{display:flex;gap:2px}.sb{flex:1;padding:10px 0;border-radius:6px;border:none;background:#141417;color:var(--tm);font-size:11px;font-weight:700;font-family:var(--fh);letter-spacing:.02em;cursor:pointer;transition:all .1s}
.cw{display:flex;flex-wrap:wrap;gap:6px}.chip{padding:9px 15px;border-radius:99px;border:1px solid var(--bd);background:var(--inp);color:var(--tm);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}.chip:active{transform:scale(.95)}
.tgl{width:100%;padding:15px;border-radius:12px;border:1px solid var(--bd);background:transparent;color:var(--ts);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;text-align:center}.tgl.ad{border-color:#ef4444;background:rgba(239,68,68,.06);color:#fca5a5}.tgl.aa{border-color:var(--ac);background:var(--ad);color:var(--ac)}
.ta{width:100%;padding:13px;border-radius:10px;border:1px solid var(--bd);background:var(--inp);color:var(--tx);font-family:var(--fb);font-size:14px;resize:vertical;min-height:56px;box-sizing:border-box;outline:none}.ta:focus{border-color:var(--ac)}.ta::placeholder{color:var(--tm)}
.ni{width:100%;padding:13px;border-radius:10px;border:1px solid var(--bd);background:var(--inp);color:var(--tx);font-family:var(--fb);font-size:16px;font-weight:600;box-sizing:border-box;outline:none}.ni:focus{border-color:var(--ac)}.ni::placeholder{color:var(--tm)}
.sv{width:100%;padding:17px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--ac),#b8942e);color:#0a0a0c;font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px;box-shadow:0 4px 20px rgba(200,168,78,.2)}.sv:active{opacity:.85}
.card{background:var(--cd);border-radius:12px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:8px;position:relative;animation:fs .25s ease-out}
.ct{font-size:10px;font-weight:600;color:var(--tm);font-family:var(--fh);letter-spacing:.06em;text-transform:uppercase}
.cdl{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--tm);font-size:16px;cursor:pointer;padding:2px 6px}.cdl:active{color:#ef4444}
.tag{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;font-family:var(--fh);letter-spacing:.03em;display:inline-block;margin:2px}
.tr{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.en{font-size:12px;color:var(--ts);margin-top:8px;font-family:var(--fb);line-height:1.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gb{padding:11px;border-radius:10px;text-align:left;cursor:pointer;border:1px solid var(--bd);background:var(--inp);transition:all .1s}.gb:active{transform:scale(.97)}
.hdr{padding:18px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.hb{padding:7px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--ts);font-size:10px;font-weight:700;font-family:var(--fh);letter-spacing:.06em;text-transform:uppercase;cursor:pointer}.hb:active{background:var(--bd)}
.tbtn{width:calc(100% - 32px);margin:0 16px 12px;padding:12px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}.tbtn.ac{border-color:var(--ac);background:var(--ad)}
.cnt{position:relative;z-index:2;padding:16px 16px 100px;overflow-y:auto;height:calc(100vh - 175px);-webkit-overflow-scrolling:touch}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:10;background:rgba(17,17,20,.94);border-top:1px solid var(--bd);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.bns{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 8px calc(20px + var(--sb));gap:2px;scroll-behavior:smooth}.bns::-webkit-scrollbar{display:none}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;min-width:50px;flex-shrink:0;position:relative;cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:var(--tm)}
.fr{display:flex;gap:10px}
</style>
</head>
<body>
<div class="app" id="app"><div class="grain"></div><div class="carbon"></div></div>
<script>
// ═══ DATA ═══
const MODS=[{id:"mood",l:"Mood",i:"◧",c:"#3b82f6"},{id:"pain",l:"Pain",i:"╋",c:"#f97316"},{id:"gut",l:"Gut",i:"▣",c:"#f59e0b"},{id:"sleep",l:"Sleep",i:"◑",c:"#6366f1"},{id:"hydration",l:"Hydra.",i:"◎",c:"#06b6d4"},{id:"head",l:"Head",i:"△",c:"#ef4444"},{id:"meds",l:"Meds",i:"▤",c:"#ec4899"},{id:"vitals",l:"Vitals",i:"▲",c:"#10b981"},{id:"sexual",l:"Sexual",i:"◇",c:"#8b5cf6"}];
const CKM={id:"checkin",l:"Today",i:"◻",c:"#c8a84e"};
const BR=[{t:1,d:"Hard lumps",i:"●●●",c:"#92400e"},{t:2,d:"Lumpy sausage",i:"▬●●",c:"#a16207"},{t:3,d:"Cracked sausage",i:"▬▬≈",c:"#b45309"},{t:4,d:"Smooth snake",i:"▬▬▬",c:"#16a34a"},{t:5,d:"Soft blobs",i:"○○○",c:"#15803d"},{t:6,d:"Mushy",i:"≈≈≈",c:"#d97706"},{t:7,d:"Liquid",i:"~~~",c:"#dc2626"}];
const SV={0:"#1e293b",1:"#22c55e",2:"#84cc16",3:"#eab308",4:"#f59e0b",5:"#f97316",6:"#ef4444",7:"#dc2626",8:"#b91c1c",9:"#991b1b",10:"#7f1d1d"};
const SI={0:"#1e293b",1:"#7f1d1d",2:"#991b1b",3:"#b91c1c",4:"#dc2626",5:"#f97316",6:"#f59e0b",7:"#eab308",8:"#84cc16",9:"#22c55e",10:"#16a34a"};
const HL=["Forehead","Temples","Behind eyes","Top of head","Back of head","One side","Whole head","Neck/base"];
const HT=["Stress","Poor sleep","Bright light","Loud noise","Skipped meal","Weather","Screen time","Exertion","Caffeine","Dehydration","Meds"];
const HS=["Nausea","Light sensitivity","Sound sensitivity","Aura/visual","Dizziness","Vomiting","Neck stiffness","Brain fog"];
const DU=["< 1 hr","1-4 hrs","4-8 hrs","8-24 hrs","24+ hrs","Multi-day"];
const PL=["Lower back","Upper back","Neck","Left knee","Right knee","Left ankle","Right ankle","Left foot","Right foot","Left hip","Right hip","Left shoulder","Right shoulder","Left wrist","Right wrist","Chest","Abdomen","Jaw/TMJ"];
const PY=["Sharp","Dull/aching","Burning","Throbbing","Shooting","Stiffness","Tingling/numbness","Cramping"];
const MO=["Solid","Low","Anxious","Irritable","Angry","Numb","Restless","Motivated","Overwhelmed","Hopeless"];
const MC={Solid:"#22c55e",Low:"#6366f1",Anxious:"#f59e0b",Irritable:"#f97316",Angry:"#ef4444",Numb:"#64748b",Restless:"#eab308",Motivated:"#10b981",Overwhelmed:"#dc2626",Hopeless:"#475569"};
const PE=[{id:1,c:"#fef9c3",l:"Clear",h:"Well hydrated",s:"good"},{id:2,c:"#fef08a",l:"Lt Yellow",h:"Hydrated",s:"good"},{id:3,c:"#fde047",l:"Yellow",h:"Normal",s:"ok"},{id:4,c:"#facc15",l:"Dk Yellow",h:"Mild dehydr.",s:"warn"},{id:5,c:"#eab308",l:"Amber",h:"Dehydrated",s:"warn"},{id:6,c:"#ca8a04",l:"Honey",h:"Very dehydr.",s:"bad"},{id:7,c:"#a16207",l:"Brown",h:"Severe dehydr.",s:"bad"},{id:8,c:"#d4a0a0",l:"Pink/Red",h:"See doctor",s:"bad"}];
const US=["Urgency","Weak stream","Frequent","Burning","Incomplete emptying","Nighttime waking","Dribbling","Hesitancy"];
const EF=[{v:1,l:"None",d:"No response"},{v:2,l:"Partial",d:"Some but not enough"},{v:3,l:"Moderate",d:"Enough with difficulty"},{v:4,l:"Full",d:"Fully functional"}];
const EA=["Stress","Fatigue","Alcohol","Medication side effect","Performance anxiety","Low libido","Pain","No identifiable cause"];
const SQ=[{v:1,l:"Terrible",c:"#ef4444"},{v:2,l:"Poor",c:"#f97316"},{v:3,l:"Fair",c:"#eab308"},{v:4,l:"Good",c:"#22c55e"},{v:5,l:"Great",c:"#10b981"}];
const SIS=["Trouble falling asleep","Woke multiple times","Gasping/choking","Snoring","Nightmares","Night sweats","Restless legs","Early waking","Can't stay awake during day"];
const CM=["Ibuprofen","Acetaminophen","Aspirin","SSRI/Antidepressant","Blood pressure med","Melatonin","Multivitamin","Vitamin D","Fish oil","Magnesium","Allergy med","Acid reducer","Testosterone","CBD/THC","Probiotic","Fiber supplement","Stool softener"];
const MT=["Morning","Midday","Evening","Bedtime","As needed"];
const CO=[{v:1,l:"Rough",c:"#ef4444"},{v:2,l:"Off",c:"#f97316"},{v:3,l:"Okay",c:"#eab308"},{v:4,l:"Good",c:"#22c55e"},{v:5,l:"Great",c:"#10b981"}];
const CF=[{l:"Headache",c:"#ef4444"},{l:"Gut issues",c:"#f59e0b"},{l:"Took meds",c:"#ec4899"},{l:"ED issue",c:"#8b5cf6"},{l:"Poor sleep",c:"#6366f1"},{l:"High stress",c:"#f97316"}];

// ═══ STATE ═══
let G={mod:"mood",form:false,entries:JSON.parse(localStorage.getItem("cp3")||"[]"),f:{}};
function rf(){G.f={bristol:null,noMov:false,strain:false,blood:false,pain:0,bloat:0,notes:"",sev:5,locs:[],trigs:[],syms:[],prost:false,dur:"",h_notes:"",firm:null,am:null,lib:5,facs:[],s_notes:"",pLoc:[],pType:[],pSev:5,lim:false,p_notes:"",qual:null,hrs:"",iss:[],sl_notes:"",bs:"",sys_:"",dia:"",hr_:"",wt:"",v_notes:"",moods:[],energy:5,stress:5,m_notes:"",pee:null,water:0,uSym:[],nw:"",u_notes:"",meds:[],custom:"",mtime:"",med_notes:"",overall:null,ck_energy:5,ck_pain:0,ck_sleep:null,flags:[]}}
rf();
function sv(){localStorage.setItem("cp3",JSON.stringify(G.entries))}
function sc(n){return SV[n]||"#1e293b"}
function si(n){return SI[n]||"#1e293b"}
function fD(i){return new Date(i).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function fT(i){return new Date(i).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
function fDT(i){return fD(i)+" "+fT(i)}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function tag(t,c){return`<span class="tag" style="background:${c||"var(--ac)"}14;color:${c||"var(--ac)"}">${t}</span>`}
function tgl(f,v){const a=G.f[f];const i=a.indexOf(v);if(i>-1)a.splice(i,1);else a.push(v);render()}
function oc(v,lo,hi){return v>=hi?"#22c55e":v>=lo?"#eab308":"#ef4444"}
function ocR(v,lo,hi){return v<=lo?"#22c55e":v<=hi?"#eab308":"#ef4444"}

// ═══ BUILDERS ═══
function sr(field,min,max,inv){let h='<div class="sr">';for(let v=min;v<=max;v++){const f=G.f[field]>=v&&v>0;const cl=inv?si(v):sc(v);h+=`<button class="sb" style="${f?`background:${cl};color:#fff`:""}" onclick="G.f.${field}=${v};render()">${v}</button>`}return h+'</div>'}
function cg(field,items,cm){let h='<div class="cw">';items.forEach(it=>{const s=G.f[field].includes(it);const c=(cm&&cm[it])||"var(--ac)";h+=`<button class="chip" style="${s?`border-color:${c};background:${c}18;color:${c}`:""}" onclick="tgl('${field}',\`${it.replace(/'/g,"\\'")}\`)">${it}</button>`});return h+'</div>'}

// ═══ FORMS ═══
function formCheckin(){let h=`<div style="font-size:13px;color:var(--ts);margin-bottom:20px;line-height:1.5">Quick daily snapshot. 15 seconds.</div>`;
h+=`<div class="sec"><span class="lbl">How are you today?</span><div style="display:flex;gap:6px">`;CO.forEach(o=>{const s=G.f.overall===o.v;h+=`<button class="gb" style="flex:1;text-align:center;${s?`border:2px solid ${o.c};background:${o.c}12`:""}" onclick="G.f.overall=${o.v};render()"><div style="font-size:22px;font-weight:800;font-family:var(--fh);color:${s?o.c:"var(--tm)"}">${o.v}</div><div style="font-size:9px;font-weight:700;font-family:var(--fh);color:${s?o.c:"var(--tm)"};margin-top:1px">${o.l}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Energy: ${G.f.ck_energy}/10</span>${sr("ck_energy",1,10,true)}</div>`;
h+=`<div class="sec"><span class="lbl">Pain: ${G.f.ck_pain}/10</span>${sr("ck_pain",0,10,false)}</div>`;
h+=`<div class="sec"><span class="lbl">Last night's sleep</span><div style="display:flex;gap:6px">`;SQ.forEach(q=>{const s=G.f.ck_sleep===q.v;h+=`<button class="gb" style="flex:1;text-align:center;${s?`border:2px solid ${q.c};background:${q.c}12`:""}" onclick="G.f.ck_sleep=${q.v};render()"><div style="font-size:16px;font-weight:800;font-family:var(--fh);color:${s?q.c:"var(--tm)"}">${q.v}</div><div style="font-size:8px;font-weight:600;font-family:var(--fh);color:${s?q.c:"var(--tm)"}">${q.l}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Quick flags</span><div class="cw">`;CF.forEach(f=>{const s=G.f.flags.includes(f.l);h+=`<button class="chip" style="${s?`border-color:${f.c};background:${f.c}15;color:${f.c}`:""}" onclick="tgl('flags','${f.l}')">${s?"✓ ":""}${f.l}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Anything worth noting today..." onchange="G.f.notes=this.value">${G.f.notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveCheckin()">LOG IT</button>`;return h}

function formMood(){let h='';
h+=`<div class="sec"><span class="lbl">How are you feeling?</span>${cg("moods",MO,MC)}</div>`;
h+=`<div class="sec"><span class="lbl">Energy: ${G.f.energy}/10</span>${sr("energy",1,10,true)}</div>`;
h+=`<div class="sec"><span class="lbl">Stress: ${G.f.stress}/10</span>${sr("stress",1,10,false)}</div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="What's on your mind..." onchange="G.f.m_notes=this.value">${G.f.m_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveMood()">LOG IT</button>`;return h}

function formPain(){let h='';
h+=`<div class="sec"><span class="lbl">Where does it hurt?</span>${cg("pLoc",PL)}</div>`;
h+=`<div class="sec"><span class="lbl">Type of pain</span>${cg("pType",PY)}</div>`;
h+=`<div class="sec"><span class="lbl">Severity: ${G.f.pSev}/10</span>${sr("pSev",1,10,false)}</div>`;
h+=`<div class="sec"><button class="tgl ${G.f.lim?"ad":""}" onclick="G.f.lim=!G.f.lim;render()">${G.f.lim?"⚠ Limited ability to function":"Did this limit your ability to function?"}</button></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Activity when pain started, relief attempts..." onchange="G.f.p_notes=this.value">${G.f.p_notes}</textarea></div>`;
h+=`<button class="sv" onclick="savePain()">LOG IT</button>`;return h}

function formGut(){let h='';
h+=`<div class="sec"><button class="tgl ${G.f.noMov?"ad":""}" onclick="G.f.noMov=!G.f.noMov;render()">${G.f.noMov?"⚠ No bowel movement today":"Tap if NO bowel movement today"}</button></div>`;
if(!G.f.noMov){h+=`<div class="sec"><span class="lbl">Bristol Stool Type</span><div class="g2">`;BR.forEach(b=>{const s=G.f.bristol===b.t;h+=`<button class="gb" style="${s?`border:2px solid ${b.c};background:${b.c}10`:""}" onclick="G.f.bristol=${b.t};render()"><div style="font-size:16px;letter-spacing:3px;color:${b.c};font-family:var(--fh);font-weight:700">${b.i}</div><div style="font-size:12px;font-weight:700;color:var(--tx);font-family:var(--fh)">Type ${b.t}</div><div style="font-size:11px;color:var(--tm)">${b.d}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><div class="fr"><button class="chip" style="flex:1;${G.f.strain?`border-color:var(--ac);background:var(--ad);color:var(--ac)`:""}" onclick="G.f.strain=!G.f.strain;render()">${G.f.strain?"✓ ":""}Straining</button><button class="chip" style="flex:1;${G.f.blood?`border-color:#ef4444;background:rgba(239,68,68,.06);color:#fca5a5`:""}" onclick="G.f.blood=!G.f.blood;render()">${G.f.blood?"✓ ":""}Blood</button></div></div>`}
h+=`<div class="sec"><span class="lbl">Abdominal Pain: ${G.f.pain}/10</span>${sr("pain",0,10,false)}</div>`;
h+=`<div class="sec"><span class="lbl">Bloating: ${G.f.bloat}/10</span>${sr("bloat",0,10,false)}</div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Diet, meds, symptoms..." onchange="G.f.notes=this.value">${G.f.notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveGut()">LOG IT</button>`;return h}

function formSleep(){let h='';
h+=`<div class="sec"><span class="lbl">Sleep Quality</span><div style="display:flex;gap:6px">`;SQ.forEach(q=>{const s=G.f.qual===q.v;h+=`<button class="gb" style="flex:1;text-align:center;${s?`border:2px solid ${q.c};background:${q.c}12`:""}" onclick="G.f.qual=${q.v};render()"><div style="font-size:18px;font-weight:800;font-family:var(--fh);color:${s?q.c:"var(--tm)"}">${q.v}</div><div style="font-size:9px;font-weight:600;font-family:var(--fh);color:${s?q.c:"var(--tm)"}">${q.l}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Hours Slept</span><div class="cw">`;["<4","4-5","5-6","6-7","7-8","8-9","9+"].forEach(hr=>{const s=G.f.hrs===hr;h+=`<button class="chip" style="${s?`border-color:var(--ac);background:var(--ad);color:var(--ac)`:""}" onclick="G.f.hrs=G.f.hrs==='${hr}'?'':'${hr}';render()">${hr}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Issues</span>${cg("iss",SIS)}</div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Partner observations, CPAP use, meds..." onchange="G.f.sl_notes=this.value">${G.f.sl_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveSleep()">LOG IT</button>`;return h}

function formHydration(){let h='';
const wc=G.f.water>=64?"#22c55e":G.f.water>=32?"var(--ac)":"#ef4444";
h+=`<div class="sec"><span class="lbl">Water Intake</span><div style="display:flex;align-items:center;gap:16px;justify-content:center;padding:8px 0"><button style="width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--inp);color:var(--tx);font-size:22px;font-weight:300;font-family:var(--fh);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="G.f.water=Math.max(0,G.f.water-8);render()">−</button><div style="text-align:center"><div style="font-size:42px;font-weight:800;font-family:var(--fh);color:${wc};line-height:1">${G.f.water}</div><div style="font-size:10px;font-weight:600;font-family:var(--fh);color:var(--ts);letter-spacing:.08em;text-transform:uppercase;margin-top:4px">oz today</div></div><button style="width:44px;height:44px;border-radius:50%;border:1px solid var(--ac);background:var(--ad);color:var(--ac);font-size:22px;font-weight:300;font-family:var(--fh);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="G.f.water+=8;render()">+</button></div><div style="display:flex;gap:4px;margin-top:8px">`;
[16,24,32,48,64,80,96,128].forEach(n=>{const s=G.f.water===n;h+=`<button class="sb" style="flex:1;${s?`border:1px solid var(--ac);background:var(--ad);color:var(--ac)`:""}" onclick="G.f.water=${n};render()">${n}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Urine Color — Hydration Check</span><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">`;PE.forEach(p=>{const s=G.f.pee===p.id;const stc=p.s==="good"?"#22c55e":p.s==="warn"?"#f59e0b":"#ef4444";h+=`<button class="gb" style="text-align:center;${s?"border:2px solid rgba(255,255,255,.5)":""}" onclick="G.f.pee=${p.id};render()"><div style="width:28px;height:28px;border-radius:50%;background:${p.c};margin:0 auto 5px;border:2px solid rgba(255,255,255,.08);${s?`box-shadow:0 0 14px ${p.c}`:""}"></div><div style="font-size:9px;font-weight:700;font-family:var(--fh);color:${s?"var(--tx)":"var(--tm)"};line-height:1.2">${p.l}</div><div style="font-size:8px;font-weight:600;font-family:var(--fh);margin-top:2px;color:${stc}">${p.h}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Urinary Symptoms</span>${cg("uSym",US)}</div>`;
h+=`<div class="sec"><span class="lbl">Night Wakes to Urinate</span><div style="display:flex;gap:6px">`;["0","1","2","3","4","5+"].forEach(n=>{const s=G.f.nw===n;h+=`<button class="sb" style="flex:1;padding:11px 0;${s?"border:1px solid #06b6d4;background:rgba(6,182,212,.08);color:#22d3ee":""}" onclick="G.f.nw='${n}';render()">${n}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Coffee, alcohol, other fluids..." onchange="G.f.u_notes=this.value">${G.f.u_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveHydration()">LOG IT</button>`;return h}

function formHead(){let h='';
h+=`<div class="sec"><span class="lbl">Severity: ${G.f.sev}/10</span>${sr("sev",1,10,false)}</div>`;
h+=`<div class="sec"><span class="lbl">Location</span>${cg("locs",HL)}</div>`;
h+=`<div class="sec"><span class="lbl">Triggers</span>${cg("trigs",HT)}</div>`;
h+=`<div class="sec"><span class="lbl">Symptoms</span>${cg("syms",HS)}</div>`;
h+=`<div class="sec"><button class="tgl ${G.f.prost?"ad":""}" onclick="G.f.prost=!G.f.prost;render()">${G.f.prost?"⚠ PROSTRATING — Unable to function":"Was this prostrating? (couldn't function)"}</button></div>`;
h+=`<div class="sec"><span class="lbl">Duration</span><div class="cw">`;DU.forEach(d=>{const s=G.f.dur===d;h+=`<button class="chip" style="${s?`border-color:var(--ac);background:var(--ad);color:var(--ac)`:""}" onclick="G.f.dur=G.f.dur==='${d}'?'':'${d}';render()">${d}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="What were you doing, meds taken..." onchange="G.f.h_notes=this.value">${G.f.h_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveHead()">LOG IT</button>`;return h}

function formMeds(){let h='';
h+=`<div class="sec"><span class="lbl">What did you take?</span>${cg("meds",CM)}`;
h+=`<div style="display:flex;gap:8px;margin-top:10px"><input class="ni" style="flex:1;font-size:13px" value="${esc(G.f.custom)}" placeholder="Add custom med..." onchange="G.f.custom=this.value" onkeydown="if(event.key==='Enter')addCM()"><button style="padding:11px 16px;border-radius:10px;border:1px solid var(--ac);background:var(--ad);color:var(--ac);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer" onclick="addCM()">Add</button></div></div>`;
h+=`<div class="sec"><span class="lbl">Time Taken</span><div class="cw">`;MT.forEach(t=>{const s=G.f.mtime===t;h+=`<button class="chip" style="${s?`border-color:var(--ac);background:var(--ad);color:var(--ac)`:""}" onclick="G.f.mtime=G.f.mtime==='${t}'?'':'${t}';render()">${t}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Dosage, side effects noticed..." onchange="G.f.med_notes=this.value">${G.f.med_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveMeds()">LOG IT</button>`;return h}

function formVitals(){let h='';
h+=`<div class="sec"><span class="lbl">Blood Sugar (mg/dL)</span><input type="number" class="ni" placeholder="e.g. 110" value="${G.f.bs}" onchange="G.f.bs=this.value"></div>`;
h+=`<div class="sec"><span class="lbl">Blood Pressure</span><div style="display:flex;gap:8px;align-items:center"><input type="number" class="ni" style="flex:1;text-align:center" placeholder="SYS" value="${G.f.sys_}" onchange="G.f.sys_=this.value"><span style="color:var(--tm);font-weight:700;font-family:var(--fh)">/</span><input type="number" class="ni" style="flex:1;text-align:center" placeholder="DIA" value="${G.f.dia}" onchange="G.f.dia=this.value"></div></div>`;
h+=`<div class="sec"><span class="lbl">Heart Rate (BPM)</span><input type="number" class="ni" placeholder="e.g. 72" value="${G.f.hr_}" onchange="G.f.hr_=this.value"></div>`;
h+=`<div class="sec"><span class="lbl">Weight (lbs)</span><input type="number" class="ni" placeholder="e.g. 195" value="${G.f.wt}" onchange="G.f.wt=this.value"></div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Fasting? Post-meal? Meds taken?" onchange="G.f.v_notes=this.value">${G.f.v_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveVitals()">LOG IT</button>`;return h}

function formSexual(){let h='';
h+=`<div class="sec"><span class="lbl">Erection Firmness (EHS)</span><div class="g2">`;EF.forEach(f=>{const s=G.f.firm===f.v;h+=`<button class="gb" style="${s?"border:2px solid #8b5cf6;background:rgba(139,92,246,.08)":""}" onclick="G.f.firm=${f.v};render()"><div style="font-size:20px;font-weight:800;color:${s?"#8b5cf6":"var(--tx)"};font-family:var(--fh)">${f.v}</div><div style="font-size:12px;font-weight:700;color:var(--tx);font-family:var(--fh)">${f.l}</div><div style="font-size:11px;color:var(--tm)">${f.d}</div></button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Morning Erection?</span><div style="display:flex;gap:8px">`;["Yes","No","Unsure"].forEach(v=>{const s=G.f.am===v;h+=`<button class="chip" style="flex:1;${s?"border-color:#8b5cf6;background:rgba(139,92,246,.08);color:#a78bfa":""}" onclick="G.f.am='${v}';render()">${v}</button>`});h+=`</div></div>`;
h+=`<div class="sec"><span class="lbl">Libido: ${G.f.lib}/10</span>${sr("lib",1,10,true)}</div>`;
h+=`<div class="sec"><span class="lbl">Contributing Factors</span>${cg("facs",EA)}</div>`;
h+=`<div class="sec"><textarea class="ta" placeholder="Additional context..." onchange="G.f.s_notes=this.value">${G.f.s_notes}</textarea></div>`;
h+=`<button class="sv" onclick="saveSexual()">LOG IT</button>`;return h}

function addCM(){const v=G.f.custom.trim();if(v&&!G.f.meds.includes(v)){G.f.meds.push(v);G.f.custom="";render()}}
// ═══ SAVE FUNCTIONS ═══
function saveCheckin(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"checkin",overall:G.f.overall,energy:G.f.ck_energy,pain:G.f.ck_pain,sleep:G.f.ck_sleep,flags:[...G.f.flags],notes:G.f.notes});sv();G.form=false;rf();render()}
function saveMood(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"mood",moods:[...G.f.moods],energy:G.f.energy,stressLevel:G.f.stress,notes:G.f.m_notes});sv();G.form=false;rf();render()}
function savePain(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"pain",locations:[...G.f.pLoc],types:[...G.f.pType],severity:G.f.pSev,limitedFunction:G.f.lim,notes:G.f.p_notes});sv();G.form=false;rf();render()}
function saveGut(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"gut",noMovement:G.f.noMov,bristol:G.f.noMov?null:G.f.bristol,strain:G.f.noMov?false:G.f.strain,blood:G.f.noMov?false:G.f.blood,pain:G.f.pain,bloating:G.f.bloat,notes:G.f.notes});sv();G.form=false;rf();render()}
function saveSleep(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"sleep",quality:G.f.qual,hours:G.f.hrs,issues:[...G.f.iss],notes:G.f.sl_notes});sv();G.form=false;rf();render()}
function saveHydration(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"hydration",water:G.f.water,peeColor:G.f.pee,symptoms:[...G.f.uSym],nightWakes:G.f.nw,notes:G.f.u_notes});sv();G.form=false;rf();render()}
function saveHead(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"head",severity:G.f.sev,locations:[...G.f.locs],triggers:[...G.f.trigs],symptoms:[...G.f.syms],prostrating:G.f.prost,duration:G.f.dur,notes:G.f.h_notes});sv();G.form=false;rf();render()}
function saveMeds(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"meds",medications:[...G.f.meds],timeTaken:G.f.mtime,notes:G.f.med_notes});sv();G.form=false;rf();render()}
function saveVitals(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"vitals",bloodSugar:G.f.bs||null,systolic:G.f.sys_||null,diastolic:G.f.dia||null,heartRate:G.f.hr_||null,weight:G.f.wt||null,notes:G.f.v_notes});sv();G.form=false;rf();render()}
function saveSexual(){G.entries.push({id:Date.now().toString(),timestamp:new Date().toISOString(),module:"sexual",firmness:G.f.firm,morningErection:G.f.am,libido:G.f.lib,factors:[...G.f.facs],notes:G.f.s_notes});sv();G.form=false;rf();render()}
function delEntry(id){G.entries=G.entries.filter(e=>e.id!==id);sv();render()}
function doReset(){if(confirm("Delete ALL entries? This cannot be undone.")){G.entries=[];sv();render()}}

// ═══ ENTRY CARD RENDERER ═══
function renderCard(e){
const m=e.module;let bc="var(--bd)";let inner="";
if(m==="checkin"){const o=e.overall?CO.find(x=>x.v===e.overall):null;const s=e.sleep?SQ.find(x=>x.v===e.sleep):null;inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">`;if(o)inner+=`<span style="font-size:22px;font-weight:800;font-family:var(--fh);color:${o.c}">${o.l}</span>`;inner+=tag(`Energy ${e.energy}/10`,oc(e.energy,4,7));if(e.pain>0)inner+=tag(`Pain ${e.pain}/10`,ocR(e.pain,3,6));if(s)inner+=tag(`Sleep: ${s.l}`,s.c);inner+=`</div><div class="tr">`;(e.flags||[]).forEach(f=>{const fc=f==="Headache"?"#ef4444":f==="Gut issues"?"#f59e0b":f==="Took meds"?"#ec4899":f==="ED issue"?"#8b5cf6":f==="Poor sleep"?"#6366f1":"#f97316";inner+=tag(f,fc)});inner+=`</div>`}
else if(m==="gut"){const b=e.bristol?BR.find(x=>x.t===e.bristol):null;if(e.noMovement){bc="rgba(239,68,68,0.3)";inner+=`<div style="color:#fca5a5;font-size:14px;font-weight:700;font-family:var(--fh);margin-top:6px">⚠ No bowel movement</div>`}else if(b){const tc=(b.t>=3&&b.t<=5)?"#22c55e":(b.t===1||b.t===7)?"#ef4444":"#eab308";inner+=`<div style="display:flex;align-items:center;gap:10px;margin-top:6px"><span style="color:${b.c};font-size:16px;letter-spacing:3px;font-family:var(--fh);font-weight:700">${b.i}</span><span style="font-size:14px;font-weight:600;color:${tc}">Type ${b.t} — ${b.d}</span></div>`}if(e.blood)bc="rgba(239,68,68,0.3)";inner+=`<div class="tr">`;if(e.pain>0)inner+=tag(`Pain ${e.pain}/10`,ocR(e.pain,3,6));if(e.bloating>0)inner+=tag(`Bloating ${e.bloating}/10`,ocR(e.bloating,3,6));if(e.strain)inner+=tag("Straining","#f59e0b");if(e.blood)inner+=tag("Blood","#ef4444");inner+=`</div>`}
else if(m==="head"){if(e.prostrating)bc="rgba(239,68,68,0.4)";inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="font-size:24px;font-weight:800;font-family:var(--fh);color:${ocR(e.severity,3,6)}">${e.severity}</span><span style="font-size:13px;color:var(--ts)">/10</span>`;if(e.prostrating)inner+=tag("PROSTRATING","#ef4444");if(e.duration)inner+=tag(e.duration,"#3b82f6");inner+=`</div><div class="tr">`;(e.locations||[]).forEach(l=>inner+=tag(l,"#6366f1"));(e.triggers||[]).forEach(t=>inner+=tag(t,"#f59e0b"));(e.symptoms||[]).forEach(s=>inner+=tag(s,"#ec4899"));inner+=`</div>`}
else if(m==="sexual"){const f=e.firmness?EF.find(x=>x.v===e.firmness):null;const sxc=e.firmness?(e.firmness>=4?"#22c55e":e.firmness>=3?"#eab308":"#ef4444"):"#8b5cf6";inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">`;if(f)inner+=`<span style="font-size:22px;font-weight:800;font-family:var(--fh);color:${sxc}">${f.l}</span><span style="font-size:12px;color:var(--ts)">EHS ${f.v}/4</span>`;if(e.morningErection)inner+=tag(`AM: ${e.morningErection}`,e.morningErection==="Yes"?"#22c55e":e.morningErection==="No"?"#ef4444":"#eab308");inner+=tag(`Libido ${e.libido}/10`,oc(e.libido,4,7));inner+=`</div><div class="tr">`;(e.factors||[]).forEach(f=>inner+=tag(f,"#6366f1"));inner+=`</div>`}
else if(m==="pain"){if(e.limitedFunction)bc="rgba(239,68,68,0.3)";inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="font-size:22px;font-weight:800;font-family:var(--fh);color:${ocR(e.severity,3,6)}">${e.severity}</span><span style="font-size:13px;color:var(--ts)">/10</span>`;if(e.limitedFunction)inner+=tag("LIMITED FUNCTION","#ef4444");inner+=`</div><div class="tr">`;(e.locations||[]).forEach(l=>inner+=tag(l,"#f97316"));(e.types||[]).forEach(t=>inner+=tag(t,"#eab308"));inner+=`</div>`}
else if(m==="sleep"){const q=e.quality?SQ.find(x=>x.v===e.quality):null;inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px">`;if(q)inner+=`<span style="font-size:16px;font-weight:700;font-family:var(--fh);color:${q.c}">${q.l}</span>`;if(e.hours)inner+=tag(`${e.hours} hrs`,"#6366f1");inner+=`</div><div class="tr">`;(e.issues||[]).forEach(i=>inner+=tag(i,"#818cf8"));inner+=`</div>`}
else if(m==="vitals"){const bsV=e.bloodSugar?parseFloat(e.bloodSugar):null;const bsC=bsV?(bsV<=100?"#22c55e":bsV<=125?"#eab308":"#ef4444"):"#10b981";const syV=e.systolic?parseFloat(e.systolic):null;const bpC=syV?(syV<=120?"#22c55e":syV<=139?"#eab308":"#ef4444"):"#3b82f6";const hrV=e.heartRate?parseFloat(e.heartRate):null;const hrC=hrV?(hrV>=60&&hrV<=100?"#22c55e":(hrV>=50&&hrV<=110)?"#eab308":"#ef4444"):"#ef4444";inner+=`<div class="tr" style="margin-top:8px">`;if(e.bloodSugar)inner+=tag(`Sugar: ${e.bloodSugar}`,bsC);if(e.systolic&&e.diastolic)inner+=tag(`BP: ${e.systolic}/${e.diastolic}`,bpC);if(e.heartRate)inner+=tag(`HR: ${e.heartRate}`,hrC);if(e.weight)inner+=tag(`Wt: ${e.weight} lbs`,"#8b5cf6");inner+=`</div>`}
else if(m==="mood"){inner+=`<div class="tr" style="margin-top:8px">`;(e.moods||[]).forEach(mo=>inner+=tag(mo,MC[mo]||"var(--ac)"));inner+=tag(`Energy ${e.energy}/10`,oc(e.energy,4,7));inner+=tag(`Stress ${e.stressLevel}/10`,ocR(e.stressLevel,3,6));inner+=`</div>`}
else if(m==="hydration"){const p=e.peeColor?PE.find(x=>x.id===e.peeColor):null;const hc=p?(p.s==="good"?"#22c55e":p.s==="ok"?"#eab308":p.s==="warn"?"#f59e0b":"#ef4444"):"var(--ts)";inner+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">`;if(e.water>0)inner+=tag(`${e.water} oz`,e.water>=64?"#22c55e":e.water>=32?"var(--ac)":"#ef4444");if(p)inner+=`<div style="width:18px;height:18px;border-radius:50%;background:${p.c};border:1px solid rgba(255,255,255,.1)"></div><span style="font-size:13px;font-weight:600;color:${hc}">${p.h}</span>`;if(e.nightWakes&&e.nightWakes!=="0")inner+=tag(`Night wakes: ${e.nightWakes}`,"#06b6d4");inner+=`</div><div class="tr">`;(e.symptoms||[]).forEach(s=>inner+=tag(s,"#22d3ee"));inner+=`</div>`}
else if(m==="meds"){inner+=`<div class="tr" style="margin-top:8px">`;(e.medications||[]).forEach(m=>inner+=tag(m,"#ec4899"));if(e.timeTaken)inner+=tag(e.timeTaken,"#8b5cf6");inner+=`</div>`}
if(e.notes)inner+=`<div class="en">${esc(e.notes)}</div>`;
return`<div class="card" style="border-color:${bc}"><button class="cdl" onclick="delEntry('${e.id}')">×</button><div class="ct">${fDT(e.timestamp)}</div>${inner}</div>`}

// ═══ EXPORT ═══
function doExport(){const MN={checkin:"DAILY CHECK-IN",gut:"BOWEL / GI",head:"HEADACHES",sexual:"SEXUAL HEALTH",pain:"PAIN",sleep:"SLEEP",vitals:"VITALS",mood:"MOOD / MENTAL HEALTH",hydration:"HYDRATION / URINARY",meds:"MEDICATIONS"};let t="CHECKPOINT -- MEN'S HEALTH TRACKER\nMedical Symptom Record\nGenerated: "+new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+"\n"+"=".repeat(60)+"\n\n";const g={};G.entries.forEach(e=>{if(!g[e.module])g[e.module]=[];g[e.module].push(e)});Object.entries(g).forEach(([mod,items])=>{t+=`${MN[mod]||mod.toUpperCase()}\n${"-".repeat(40)}\nTotal entries: ${items.length}\n\n`;items.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).forEach((e,i)=>{t+=`[${i+1}] ${fDT(e.timestamp)}\n`;if(mod==="checkin"){const o=e.overall?CO.find(x=>x.v===e.overall):null;if(o)t+=`    Overall: ${o.l} (${o.v}/5)\n`;t+=`    Energy: ${e.energy}/10 | Pain: ${e.pain}/10\n`;const s=e.sleep?SQ.find(x=>x.v===e.sleep):null;if(s)t+=`    Sleep: ${s.l}\n`;if(e.flags&&e.flags.length)t+=`    Flags: ${e.flags.join(", ")}\n`}else if(mod==="gut"){if(e.noMovement)t+="    Status: NO BOWEL MOVEMENT\n";else{if(e.bristol){const b=BR.find(x=>x.t===e.bristol);if(b)t+=`    Bristol: ${b.t} (${b.d})\n`}t+=`    Pain: ${e.pain}/10 | Bloating: ${e.bloating}/10\n`;if(e.strain)t+="    Straining: Yes\n";if(e.blood)t+="    Blood: Yes\n"}}else if(mod==="head"){t+=`    Severity: ${e.severity}/10\n`;if(e.prostrating)t+="    *** PROSTRATING ***\n";if(e.duration)t+=`    Duration: ${e.duration}\n`;if(e.locations&&e.locations.length)t+=`    Location: ${e.locations.join(", ")}\n`;if(e.triggers&&e.triggers.length)t+=`    Triggers: ${e.triggers.join(", ")}\n`;if(e.symptoms&&e.symptoms.length)t+=`    Symptoms: ${e.symptoms.join(", ")}\n`}else if(mod==="sexual"){const f=e.firmness?EF.find(x=>x.v===e.firmness):null;if(f)t+=`    EHS: ${f.v}/4 (${f.l})\n`;if(e.morningErection)t+=`    Morning Erection: ${e.morningErection}\n`;t+=`    Libido: ${e.libido}/10\n`;if(e.factors&&e.factors.length)t+=`    Factors: ${e.factors.join(", ")}\n`}else if(mod==="pain"){t+=`    Severity: ${e.severity}/10\n`;if(e.limitedFunction)t+="    *** LIMITED FUNCTION ***\n";if(e.locations&&e.locations.length)t+=`    Locations: ${e.locations.join(", ")}\n`;if(e.types&&e.types.length)t+=`    Type: ${e.types.join(", ")}\n`}else if(mod==="sleep"){const q=e.quality?SQ.find(x=>x.v===e.quality):null;if(q)t+=`    Quality: ${q.l}\n`;if(e.hours)t+=`    Hours: ${e.hours}\n`;if(e.issues&&e.issues.length)t+=`    Issues: ${e.issues.join(", ")}\n`}else if(mod==="vitals"){if(e.bloodSugar)t+=`    Blood Sugar: ${e.bloodSugar} mg/dL\n`;if(e.systolic&&e.diastolic)t+=`    BP: ${e.systolic}/${e.diastolic}\n`;if(e.heartRate)t+=`    HR: ${e.heartRate} BPM\n`;if(e.weight)t+=`    Weight: ${e.weight} lbs\n`}else if(mod==="mood"){if(e.moods&&e.moods.length)t+=`    Mood: ${e.moods.join(", ")}\n`;t+=`    Energy: ${e.energy}/10 | Stress: ${e.stressLevel}/10\n`}else if(mod==="hydration"){if(e.water)t+=`    Water: ${e.water} oz\n`;const p=e.peeColor?PE.find(x=>x.id===e.peeColor):null;if(p)t+=`    Urine: ${p.l} (${p.h})\n`;if(e.nightWakes)t+=`    Night Wakes: ${e.nightWakes}\n`;if(e.symptoms&&e.symptoms.length)t+=`    Symptoms: ${e.symptoms.join(", ")}\n`}else if(mod==="meds"){if(e.medications&&e.medications.length)t+=`    Meds: ${e.medications.join(", ")}\n`;if(e.timeTaken)t+=`    Time: ${e.timeTaken}\n`}if(e.notes)t+=`    Notes: ${e.notes}\n`;t+="\n"})});t+="=".repeat(60)+"\nGenerated by CHECKPOINT\n";const blob=new Blob(["\ufeff"+t],{type:"text/plain;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`checkpoint-${new Date().toISOString().slice(0,10)}.txt`;a.click();URL.revokeObjectURL(url)}

// ═══ MAIN RENDER ═══
function render(){
const app=document.getElementById("app");
const isToday=G.mod==="checkin";
const modObj=isToday?CKM:MODS.find(m=>m.id===G.mod);
const modEntries=G.entries.filter(e=>e.module===G.mod).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
const todayCount=G.entries.filter(e=>e.module==="checkin").length;
let h='<div class="grain"></div><div class="carbon"></div>';

// Header
h+=`<div style="position:relative;z-index:2;border-bottom:1px solid var(--bd)"><div class="hdr"><div><h1 style="margin:0;font-size:22px;font-weight:800;font-family:var(--fh);letter-spacing:.14em;text-transform:uppercase;color:var(--ac);line-height:1;text-shadow:0 0 30px rgba(200,168,78,.15)">CHECKPOINT</h1><div style="font-size:9px;color:var(--tm);font-family:var(--fh);letter-spacing:.18em;margin-top:3px;text-transform:uppercase">Your body. Your data. Your call.</div></div><div style="display:flex;gap:6px"><button class="hb" onclick="doExport()">Export</button><button class="hb" style="color:var(--tm)" onclick="doReset()">Reset</button></div></div>`;
// Today button
h+=`<button class="tbtn ${isToday?"ac":""}" onclick="G.mod='checkin';G.form=false;render();scrollC()"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:16px;color:${isToday?"var(--ac)":"var(--tm)"}">◻</span><span style="font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${isToday?"var(--ac)":"var(--ts)"}">Daily Check-in</span></div><div style="display:flex;align-items:center;gap:8px">${todayCount?`<span style="background:var(--ac);color:#0a0a0c;font-size:9px;font-weight:800;border-radius:99px;padding:2px 7px;font-family:var(--fh)">${todayCount}</span>`:""}<span style="font-size:11px;color:${isToday?"var(--ac)":"var(--tm)"};font-family:var(--fh);font-weight:600">→</span></div></button></div>`;

// Content
h+=`<div class="cnt" id="cnt">`;
if(G.form){
h+=`<div style="animation:fs .25s ease-out"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="margin:0;font-size:18px;font-weight:700;font-family:var(--fh);color:var(--tx);letter-spacing:.04em;text-transform:uppercase"><span style="color:${modObj.c};margin-right:6px">${modObj.i}</span>Log ${modObj.l}</h2><button style="background:none;border:none;color:var(--tm);font-size:24px;cursor:pointer;padding:4px" onclick="G.form=false;render()">×</button></div>`;
const forms={checkin:formCheckin,mood:formMood,pain:formPain,gut:formGut,sleep:formSleep,hydration:formHydration,head:formHead,meds:formMeds,vitals:formVitals,sexual:formSexual};
h+=(forms[G.mod]||formMood)();
h+=`</div>`
}else{
h+=`<div style="animation:fs .2s ease-out"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px"><span style="color:${modObj.c};font-size:18px">${modObj.i}</span><span style="font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--tx)">${modObj.l}</span><span style="font-family:var(--fh);font-size:12px;color:var(--tm);font-weight:600">${modEntries.length} entries</span></div><button style="padding:8px 16px;border-radius:8px;border:1px solid var(--ac);background:var(--ad);color:var(--ac);font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer" onclick="G.form=true;render();scrollC()">+ Log</button></div>`;
if(!modEntries.length){h+=`<div class="empty"><div style="font-size:32px;margin-bottom:10px;opacity:.3">${modObj.i}</div><div style="font-size:13px;font-weight:700;font-family:var(--fh);letter-spacing:.06em;text-transform:uppercase">No entries yet</div><div style="font-size:12px;margin-top:6px">Tap + Log to start tracking</div></div>`}
else{modEntries.forEach(e=>{h+=renderCard(e)})}
h+=`</div>`}
h+=`</div>`;

// Bottom nav
h+=`<div class="bnav"><div class="bns">`;
MODS.forEach(m=>{const act=G.mod===m.id;const cnt=G.entries.filter(e=>e.module===m.id).length;
h+=`<button class="nb" onclick="G.mod='${m.id}';G.form=false;render();scrollC()"><span style="font-size:17px;color:${act?m.c:"var(--tm)"};transition:color .2s">${m.i}</span><span style="font-size:9px;font-weight:700;font-family:var(--fh);letter-spacing:.03em;text-transform:uppercase;color:${act?"var(--tx)":"var(--tm)"};transition:color .2s;white-space:nowrap">${m.l}</span>${act?`<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:99px;background:${m.c}"></div>`:""}${cnt?`<span style="position:absolute;top:2px;right:0;background:${m.c};color:#0a0a0c;font-size:8px;font-weight:800;border-radius:99px;padding:0 4px;font-family:var(--fh);min-width:14px;text-align:center">${cnt}</span>`:""}</button>`});
h+=`</div></div>`;
app.innerHTML=h}

function scrollC(){const c=document.getElementById("cnt");if(c)c.scrollTo(0,0)}
render();
</script>
</body>
</html>
